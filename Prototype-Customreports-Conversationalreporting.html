 *   1. Loads Roboto (the Moodle typeface) from Google Fonts + self-hosted fallback.

 *   3. Adds semantic shortcut aliases (--fg-1, --bg-surface, etc) and base
 *      element styles (h1..h6, p, a, code, ::selection, .lead, .small, .muted)

/* ============================================================ */
/* 3. Semantic aliases on top of MDS tokens                     */
/* ============================================================ */

:root {
  /* ---- Foreground tones ---- */
  --fg-1: var(--mds-text-emphasis);            /* near-black, headings, emphasis  */
  --fg-2: var(--mds-text-default);             /* default body text               */
  --fg-3: var(--mds-text-subtle);              /* secondary body, dense tables    */
  --fg-4: var(--mds-text-muted);               /* placeholder, helper text, meta  */
  --fg-inverse: var(--mds-text-inverse);       /* on dark/coloured backgrounds    */
  --fg-link: var(--mds-text-link-primary-default);
  --fg-link-hover: var(--mds-text-link-primary-hover);
  --fg-danger: var(--mds-text-danger);

  /* ---- Background tones ---- */
  --bg-surface: var(--mds-bg-surface-default); /* white canvas                    */
  --bg-subtle: var(--mds-bg-surface-subtle);   /* page background, sidebar        */
  --bg-strong: var(--mds-bg-surface-strong);   /* hover-on-gray, selected row     */

  /* ---- Brand ---- */
  --brand-primary: var(--mds-color-blue-500);      /* Moodle blue              */
  --brand-primary-hover: var(--mds-color-blue-600);
  --brand-primary-active: var(--mds-color-blue-700);
  --brand-accent: var(--mds-color-orange-500);     /* Moodle heritage orange   */

  /* ---- Borders ---- */
  --border-default: var(--mds-border-default);
  --border-subtle: var(--mds-border-subtle);
  --border-focus: var(--mds-focus-default);

  /* ---- Type family shorthands ---- */
  --font-sans: var(--mds-font-family-base);
  --font-mono: var(--mds-font-family-code);

  /* ---- Type role shorthands ---- */
  --text-h1: var(--mds-font-size-headings-1);
  --text-h2: var(--mds-font-size-headings-2);
  --text-h3: var(--mds-font-size-headings-3);
  --text-h4: var(--mds-font-size-headings-4);
  --text-h5: var(--mds-font-size-headings-5);
  --text-h6: var(--mds-font-size-headings-6);
  --text-body: var(--mds-font-size-paragraph-default);
  --text-lead: var(--mds-font-size-paragraph-lead);
  --text-small: var(--mds-font-size-paragraph-small);

  /* ---- Radii shortcuts ---- */
  --r-xs: var(--mds-border-radius-xs);
  --r-sm: var(--mds-border-radius-sm);
  --r-md: var(--mds-border-radius-md);
  --r-lg: var(--mds-border-radius-lg);
  --r-xl: var(--mds-border-radius-xl);
  --r-xxl: var(--mds-border-radius-xxl);
  --r-pill: var(--mds-border-radius-pill);

  /* ---- Shadow shortcuts ---- */
  --shadow-sm: 0 var(--mds-offset-sm) var(--mds-blur-sm) 0 var(--mds-color-sm);
  --shadow-md: 0 var(--mds-offset-md) var(--mds-blur-md) 0 var(--mds-color-md);
  --shadow-lg: 0 var(--mds-offset-lg) var(--mds-blur-lg) 0 var(--mds-color-lg);

  /* ---- Motion ---- */
  --transition-fast: 150ms ease-in-out;
  --transition-base: 200ms ease-in-out;
}

/* ============================================================ */
/* 4. Base elements                                             */
/* ============================================================ */

html {
  font-size: 16px;
}

body {
  margin: 0;
  font-family: var(--font-sans), 'Roboto Local', system-ui, -apple-system, sans-serif;
  font-size: var(--text-body);
  font-weight: var(--mds-font-weight-regular);
  line-height: var(--mds-line-height-paragraph-default);
  color: var(--fg-2);
  background-color: var(--bg-surface);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-sans), system-ui, sans-serif;
  font-weight: var(--mds-font-weight-medium);
  color: var(--fg-1);
  letter-spacing: var(--mds-letter-spacing-default);
  margin: 0 0 var(--mds-margin-bottom-heading) 0;
  text-wrap: pretty;
}

h1 { font-size: var(--text-h1); line-height: var(--mds-line-height-headings-1); }
h2 { font-size: var(--text-h2); line-height: var(--mds-line-height-headings-2); }
h3 { font-size: var(--text-h3); line-height: var(--mds-line-height-headings-3); }
h4 { font-size: var(--text-h4); line-height: var(--mds-line-height-headings-4); }
h5 { font-size: var(--text-h5); line-height: var(--mds-line-height-headings-5); }
h6 { font-size: var(--text-h6); line-height: var(--mds-line-height-headings-6); }

p {
  margin: 0 0 var(--mds-margin-bottom-paragraph) 0;
  text-wrap: pretty;
}

.lead {
  font-size: var(--text-lead);
  line-height: var(--mds-line-height-paragraph-lead);
  color: var(--fg-2);
  font-weight: var(--mds-font-weight-regular);
}

.small,
small {
  font-size: var(--text-small);
  line-height: var(--mds-line-height-paragraph-small);
}

.muted,
.text-muted {
  color: var(--fg-4);
}

.subtle {
  color: var(--fg-3);
}

a {
  color: var(--fg-link);
  text-decoration: underline;
  text-underline-offset: 0.2em;
  text-decoration-thickness: 1px;
  transition: color var(--transition-fast);
}

a:hover {
  color: var(--fg-link-hover);
}

a:focus-visible {
  outline: var(--mds-stroke-weight-md) solid var(--border-focus);
  outline-offset: 2px;
  border-radius: var(--r-xs);
}

code,
kbd,
samp,
pre {
  font-family: var(--font-mono), Menlo, Monaco, Consolas, monospace;
  font-size: 0.9em;
}

code {
  padding: 0.1em 0.3em;
  background-color: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-xs);
  color: var(--fg-1);
}

pre {
  padding: var(--mds-spacing-md);
  background-color: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  overflow: auto;
}

pre code {
  padding: 0;
  background: transparent;
  border: 0;
}

hr {
  border: 0;
  border-top: 1px solid var(--border-subtle);
  margin: var(--mds-spacing-lg) 0;
}

::selection {
  background-color: var(--mds-color-blue-200);
  color: var(--mds-text-emphasis);
}

/* Optional display sizes for marketing surfaces */
.display-1 { font-size: var(--mds-font-size-displays-1); line-height: var(--mds-line-height-displays-1); font-weight: var(--mds-font-weight-light); }
.display-2 { font-size: var(--mds-font-size-displays-2); line-height: var(--mds-line-height-displays-2); font-weight: var(--mds-font-weight-light); }
.display-3 { font-size: var(--mds-font-size-displays-3); line-height: var(--mds-line-height-displays-3); font-weight: var(--mds-font-weight-light); }
.display-4 { font-size: var(--mds-font-size-displays-4); line-height: var(--mds-line-height-displays-4); font-weight: var(--mds-font-weight-light); }
.display-5 { font-size: var(--mds-font-size-displays-5); line-height: var(--mds-line-height-displays-5); font-weight: var(--mds-font-weight-light); }
.display-6 { font-size: var(--mds-font-size-displays-6); line-height: var(--mds-line-height-displays-6); font-weight: var(--mds-font-weight-light); }

/* ============================================================ */
/* 5. Moodle wordmark placeholder                               */
/* ============================================================ */

/* Type-only wordmark. Replace with the licensed Moodle SVG when available. */
.moodle-wordmark {
  font-family: var(--font-sans), system-ui, sans-serif;
  font-weight: var(--mds-font-weight-bold);
  font-size: 1.5rem;
  letter-spacing: -0.01em;
  color: var(--brand-accent);
  display: inline-flex;
  align-items: center;
  gap: 0.25em;
}

.moodle-wordmark::before {
  content: "m";
  display: inline-grid;
  place-items: center;
  width: 1.6em;
  height: 1.6em;
  background-color: var(--brand-accent);
  color: var(--mds-color-gray-white);
  border-radius: 50%;
  font-size: 1em;
  font-weight: var(--mds-font-weight-black);
  line-height: 1;
  padding-bottom: 0.05em;
}

/* Moodle Workplace shell — top nav, page chrome, table.
   Mirrors the layout in the Program progress screenshot. */

:root {
  --topnav-h: 60px;
  --shell-max-w: 1400px;
  --row-h: 60px;
}

* { box-sizing: border-box; }

html, body { height: 100%; }
body { background: #fff; color: var(--fg-2); font-family: var(--font-sans), system-ui; overflow-x: hidden; }

a { text-decoration: none; }

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===================== Top nav ===================== */
.wp-topnav {
  position: sticky; top: 0; z-index: 50;
  height: var(--topnav-h);
  background: #fff;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: stretch;
  padding: 0 24px;
  gap: 24px;
}

/* Workplace wordmark — "moodle" with "workplace" beneath, in cyan/teal. */
.wp-wordmark {
  display: inline-flex; flex-direction: column;
  justify-content: center;
  padding: 8px 14px 8px 0;
  text-decoration: none;
  line-height: 1;
}
.wp-wordmark__moodle {
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--mds-color-cyan-500);
}
.wp-wordmark__workplace {
  font-size: 13px; font-weight: 600;
  color: var(--mds-color-cyan-500);
  margin-top: 2px;
  letter-spacing: 0.01em;
}

.wp-tenant {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px;
  font-size: 15px; font-weight: 400;
  color: var(--fg-2);
  cursor: pointer;
  border-radius: 0;
  background: transparent; border: 0;
  font-family: inherit;
}
.wp-tenant__caret { color: var(--fg-4); font-size: 11px; }

.wp-tabs {
  display: flex; align-items: stretch;
  gap: 4px;
  margin-left: 16px;
}
.wp-tab {
  display: inline-flex; align-items: center;
  padding: 0 14px;
  font-size: 15px; font-weight: 400;
  color: var(--fg-2);
  background: transparent; border: 0;
  font-family: inherit;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px; /* overlap the divider */
  text-decoration: none;
  transition: color var(--transition-fast);
}
.wp-tab:hover { color: var(--brand-primary); }
.wp-tab--active {
  color: var(--fg-1);
  border-bottom-color: var(--brand-primary);
  font-weight: 500;
}

.wp-actions {
  margin-left: auto;
  display: flex; align-items: center; gap: 2px;
}
.wp-iconbtn {
  position: relative;
  display: inline-grid; place-items: center;
  width: 36px; height: 36px;
  background: transparent; border: 0;
  border-radius: var(--r-sm);
  color: var(--fg-2);
  cursor: pointer;
}
.wp-iconbtn:hover { background: var(--bg-subtle); }
.wp-iconbtn i { font-size: 18px; }

.wp-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--brand-accent);
  color: #fff;
  display: inline-grid; place-items: center;
  border: 0; cursor: pointer;
  font-weight: 700; font-size: 13px;
  margin: 0 6px;
}
.wp-avatar__caret { position: absolute; right: -10px; color: var(--fg-3); font-size: 11px; }
.wp-avatar-wrap { position: relative; display: inline-flex; align-items: center; margin-right: 8px; padding-right: 12px; }

.wp-editmode {
  display: inline-flex; align-items: center; gap: 8px;
  padding-left: 18px;
  border-left: 1px solid var(--border-subtle);
  height: 100%;
  font-size: 13px; color: var(--fg-3);
}
.wp-toggle {
  width: 32px; height: 18px;
  border-radius: 50rem;
  background: var(--bg-strong);
  border: 0; padding: 2px;
  cursor: pointer;
  position: relative;
  transition: background var(--transition-fast);
}
.wp-toggle__knob {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  transition: transform var(--transition-fast);
}
.wp-toggle--on { background: var(--brand-primary); }
.wp-toggle--on .wp-toggle__knob { transform: translateX(14px); }

/* ===================== Page chrome ===================== */
.wp-main { flex: 1; transition: padding-right 260ms ease; }
.wp-main--panel-open { padding-right: 460px; }

.wp-page {
  max-width: var(--shell-max-w);
  margin: 0 auto;
  padding: 24px 32px 64px;
}

.wp-breadcrumb {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-size: 14px;
  margin-bottom: 8px;
}
.wp-breadcrumb a { color: var(--brand-primary); }
.wp-breadcrumb a:hover { text-decoration: underline; }
.wp-breadcrumb__sep { color: var(--fg-4); }
.wp-breadcrumb__current { color: var(--fg-2); }

.wp-pagetitle {
  font-size: 32px; font-weight: 700;
  color: var(--fg-1);
  margin: 0 0 24px;
  letter-spacing: -0.01em;
}

/* ===================== Toolbar ===================== */
.wp-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
  gap: 12px;
  flex-wrap: wrap;
}
.wp-toolbar__left { display: flex; align-items: center; gap: 12px; }
.wp-toolbar__right { display: flex; align-items: center; gap: 8px; }

.wp-tab-row {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 20px;
}
.wp-tab-row__item {
  background: transparent; border: 0;
  padding: 10px 14px;
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--fg-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
}
.wp-tab-row__item:hover { color: var(--fg-1); }
.wp-tab-row__item--active {
  color: var(--brand-primary);
  border-bottom-color: var(--brand-primary);
}

/* Buttons (Workplace flavour — outline gray) */
.btn-outline-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: #fff;
  border: 1px solid var(--mds-color-gray-400);
  border-radius: var(--r-md);
  font-family: inherit; font-size: 14px; font-weight: 400;
  color: var(--fg-2);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.btn-outline-secondary:hover {
  background: var(--bg-subtle);
  border-color: var(--mds-color-gray-500);
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--brand-primary);
  border: 1px solid var(--brand-primary);
  border-radius: var(--r-md);
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: #fff;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.btn-primary:hover { background: var(--brand-primary-hover); border-color: var(--brand-primary-hover); }

.btn-ai {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 12px;
  background: #fff;
  border: 1px solid var(--mds-color-cyan-500);
  border-radius: var(--r-md);
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--mds-color-cyan-700);
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
}
.btn-ai:hover {
  background: var(--mds-color-cyan-100);
  border-color: var(--mds-color-cyan-600);
}
.btn-ai__sparkle {
  width: 18px; height: 18px;
  display: inline-grid; place-items: center;
  color: var(--mds-color-cyan-500);
}

/* Active = panel currently open. Toggle to close. */
.btn-ai--active {
  background: var(--mds-color-cyan-500);
  border-color: var(--mds-color-cyan-500);
  color: #fff;
  padding-right: 10px;
}
.btn-ai--active .btn-ai__sparkle { color: #fff; }
.btn-ai--active:hover {
  background: var(--mds-color-cyan-600);
  border-color: var(--mds-color-cyan-600);
}
.btn-ai__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--mds-color-green-300);
  box-shadow: 0 0 0 0 rgba(134, 175, 132, 0.5);
  margin-left: 2px;
  animation: btn-ai-pulse 1.6s ease-in-out infinite;
}
@keyframes btn-ai-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(134, 175, 132, 0.55); }
  50%      { box-shadow: 0 0 0 5px rgba(134, 175, 132, 0); }
}
.btn-ai__close-x {
  display: inline-grid; place-items: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 11px;
  margin-left: 4px;
  transition: background var(--transition-fast);
}
.btn-ai--active:hover .btn-ai__close-x { background: rgba(255,255,255,0.32); }

/* ===================== Report table ===================== */
.wp-table-wrap {
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: #fff;
}
.wp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.wp-table thead th {
  text-align: left;
  vertical-align: top;
  padding: 14px 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--brand-primary);
  background: #fff;
  border-bottom: 1px solid var(--border-subtle);
  white-space: normal;
  line-height: 1.3;
}
.wp-table thead th[data-sort]::after {
  content: '';
  display: inline-block;
  margin-left: 6px;
  width: 8px; height: 12px;
  vertical-align: middle;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 12'><path d='M4 0l4 5H0z M4 12l-4-5h8z' fill='%23000'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 12'><path d='M4 0l4 5H0z M4 12l-4-5h8z' fill='%23000'/></svg>") center/contain no-repeat;
  opacity: 0.5;
}
.wp-table thead th[data-sort="asc"]::after { opacity: 1; }

.wp-table tbody tr {
  border-top: 1px solid var(--border-subtle);
}
.wp-table tbody tr:nth-child(odd) { background: var(--bg-subtle); }
.wp-table tbody tr:hover { background: var(--mds-color-blue-100); }
.wp-table tbody tr:hover .wp-row-menu { opacity: 1; }

.wp-table td {
  padding: 14px 12px;
  vertical-align: middle;
  color: var(--fg-2);
  font-size: 14px;
}
.wp-table td a { color: var(--brand-primary); }
.wp-table td a:hover { text-decoration: underline; }

.wp-user-cell {
  display: flex; align-items: center; gap: 10px;
}
.wp-user-cell__avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
}
.wp-user-cell__name { color: var(--brand-primary); }

.wp-date-cell {
  display: flex; flex-direction: column;
  gap: 4px;
}
.wp-date-cell__date { color: var(--fg-2); }
.wp-overdue-marker {
  display: inline-grid; place-items: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--mds-color-red-500);
  color: #fff;
  font-size: 11px; font-weight: 700;
  line-height: 1;
}

.wp-pill {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 4px 14px;
  border-radius: 50rem;
  font-size: 13px; font-weight: 600;
  line-height: 1.2;
  min-width: 70px;
}
.wp-pill--open { background: var(--mds-color-cyan-700); color: #fff; }
.wp-pill--inprogress { background: var(--mds-color-cyan-500); color: #fff; }
.wp-pill--completed { background: var(--mds-color-green-500); color: #fff; }
.wp-pill--overdue { background: var(--mds-color-red-500); color: #fff; }
.wp-pill--suspended { background: var(--mds-color-gray-500); color: #fff; }
.wp-pill--archived { background: var(--mds-color-gray-700); color: #fff; }

.wp-progress {
  display: flex; align-items: center; gap: 8px;
  min-width: 90px;
}
.wp-progress__num { font-variant-numeric: tabular-nums; }

.wp-row-menu {
  background: transparent; border: 0;
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  color: var(--fg-3);
  cursor: pointer;
  opacity: 0.5;
  transition: opacity var(--transition-fast), background var(--transition-fast);
}
.wp-row-menu:hover { background: var(--bg-strong); opacity: 1; }

/* Highlight a single row when assistant references it */
.wp-table tbody tr.wp-row--highlight {
  background: var(--mds-color-yellow-100) !important;
  box-shadow: inset 4px 0 0 0 var(--mds-color-yellow-500);
}
.wp-table tbody tr.wp-row--highlight td:first-child { padding-left: 14px; }

/* Highlight a column header when assistant references it */
.wp-table thead th.wp-col--highlight {
  background: var(--mds-color-yellow-100);
  color: var(--mds-color-yellow-800);
  box-shadow: inset 0 -3px 0 0 var(--mds-color-yellow-500);
}

/* ===================== Help button (bottom right) ===================== */
.wp-help {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--mds-color-gray-200);
  color: var(--fg-2);
  border: 0;
  cursor: pointer;
  display: grid; place-items: center;
  z-index: 30;
}
.wp-help:hover { background: var(--mds-color-gray-300); }

/* ===================== Filters chip (drop down indicator) ===================== */
.wp-filters {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: #fff;
  border: 1px solid var(--mds-color-gray-400);
  border-radius: var(--r-md);
  font-family: inherit; font-size: 14px;
  color: var(--fg-2);
  cursor: pointer;
}
.wp-filters i { font-size: 14px; color: var(--fg-3); }
.wp-filters:hover { background: var(--bg-subtle); }

/* ===================== Pager ===================== */
.wp-pager {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 4px 0;
  font-size: 13px; color: var(--fg-3);
}
.wp-pager__pages { display: flex; gap: 4px; align-items: center; }
.wp-pager__btn {
  background: transparent; border: 0;
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  font-family: inherit; font-size: 13px;
  color: var(--fg-2);
  cursor: pointer;
}
.wp-pager__btn--active { background: var(--brand-primary); color: #fff; }
.wp-pager__btn:hover:not(.wp-pager__btn--active) { background: var(--bg-subtle); }

/* Moodle Assistant — side panel.
   Slides in from the right, pushes the main column. */

.asst {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 460px;
  background: #fff;
  border-left: 1px solid var(--border-subtle);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 260ms ease;
  z-index: 60;
  box-shadow: var(--shadow-md);
}
.asst--open { transform: translateX(0); }

/* ===================== Header ===================== */
.asst__head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  background: #fff;
}
.asst__avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--mds-color-cyan-500), var(--mds-color-blue-500));
  display: grid; place-items: center;
  color: #fff;
  flex-shrink: 0;
}
.asst__title { flex: 1; min-width: 0; }
.asst__title h2 {
  margin: 0; font-size: 15px; font-weight: 600; color: var(--fg-1);
  display: flex; align-items: center; gap: 6px;
}
.asst__title small {
  font-size: 12px; color: var(--fg-4);
  display: flex; align-items: center; gap: 6px;
}
.asst__beta {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 1px 6px;
  background: var(--mds-color-orange-100);
  color: var(--mds-color-orange-700);
  border-radius: 4px;
}
.asst__green-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--mds-color-green-500);
}
.asst__head-actions {
  display: flex; align-items: center; gap: 2px;
}
.asst__iconbtn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-3);
  cursor: pointer;
}
.asst__iconbtn:hover { background: var(--bg-subtle); color: var(--fg-1); }
.asst__iconbtn i { font-size: 16px; }

/* ===================== Context banner ===================== */
.asst__context {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--bg-subtle);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
  color: var(--fg-3);
}
.asst__context i { color: var(--mds-color-cyan-600); font-size: 14px; }
.asst__context strong { color: var(--fg-1); font-weight: 600; }

/* ===================== Body / scroll area ===================== */
.asst__body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 8px;
  scroll-behavior: smooth;
}

/* Empty state */
.asst__empty {
  padding: 8px 0 0;
}
.asst__greeting {
  margin: 0 0 8px;
  font-size: 18px; font-weight: 500; color: var(--fg-1);
}
.asst__greeting span { color: var(--mds-color-cyan-600); }
.asst__sub {
  margin: 0 0 20px;
  font-size: 14px; color: var(--fg-3);
  line-height: 1.5;
}
.asst__suggestions {
  display: flex; flex-direction: column; gap: 8px;
}
.asst__suggestion-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--fg-4);
  margin: 4px 0 4px;
}
.asst__suggestion {
  text-align: left;
  background: #fff;
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-family: inherit;
  font-size: 13px;
  color: var(--fg-2);
  cursor: pointer;
  line-height: 1.4;
  display: flex; align-items: flex-start; gap: 10px;
  transition: all var(--transition-fast);
}
.asst__suggestion:hover {
  border-color: var(--mds-color-cyan-500);
  background: var(--mds-color-cyan-100);
  color: var(--mds-color-cyan-800);
}
.asst__suggestion i {
  color: var(--mds-color-cyan-500);
  font-size: 14px;
  margin-top: 2px;
  flex-shrink: 0;
}

/* ===================== Messages ===================== */
.asst__msg { margin-bottom: 16px; }
.asst__msg--user {
  display: flex; justify-content: flex-end;
}
.asst__msg--user .asst__bubble {
  background: var(--brand-primary);
  color: #fff;
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  max-width: 85%;
  font-size: 14px;
  line-height: 1.45;
}

.asst__msg--bot { }
.asst__msg-bot-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--fg-4);
}
.asst__msg-bot-head .asst__bot-avatar {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: linear-gradient(135deg, var(--mds-color-cyan-500), var(--mds-color-blue-500));
  display: inline-grid; place-items: center;
  color: #fff;
}
.asst__msg-bot-head .asst__bot-avatar svg { width: 12px; height: 12px; }
.asst__bot-body {
  font-size: 14px; color: var(--fg-2);
  line-height: 1.55;
}
.asst__bot-body p { margin: 0 0 10px; }
.asst__bot-body p:last-child { margin-bottom: 0; }
.asst__bot-body strong { color: var(--fg-1); font-weight: 600; }
.asst__bot-body code {
  font-size: 0.85em; padding: 1px 5px;
}
.asst__bot-body ul {
  margin: 0 0 10px;
  padding-left: 18px;
}
.asst__bot-body ul li { margin-bottom: 4px; }

/* Reasoning / trace card */
.asst__trace {
  margin: 8px 0 12px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--bg-subtle);
  font-size: 12px;
}
.asst__trace-head {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 8px 12px;
  background: transparent; border: 0;
  font-family: inherit; font-size: 12px; font-weight: 500;
  color: var(--fg-3);
  cursor: pointer; text-align: left;
}
.asst__trace-head:hover { color: var(--fg-1); }
.asst__trace-head i { font-size: 12px; transition: transform var(--transition-fast); }
.asst__trace--open .asst__trace-head .bi-chevron-right { transform: rotate(90deg); }
.asst__trace-head .asst__trace-label { flex: 1; }
.asst__trace-head .asst__trace-ms { color: var(--fg-4); font-variant-numeric: tabular-nums; }

.asst__trace-body {
  display: none;
  padding: 4px 12px 12px;
  border-top: 1px solid var(--border-subtle);
  background: #fff;
}
.asst__trace--open .asst__trace-body { display: block; }
.asst__trace-step {
  display: flex; gap: 10px;
  padding: 6px 0;
  font-size: 12px;
  color: var(--fg-3);
  border-top: 1px dashed var(--border-subtle);
}
.asst__trace-step:first-child { border-top: 0; }
.asst__trace-step__bullet {
  flex-shrink: 0;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--mds-color-cyan-100);
  color: var(--mds-color-cyan-700);
  font-weight: 700; font-size: 10px;
  display: grid; place-items: center;
  font-variant-numeric: tabular-nums;
}
.asst__trace-step__label { flex: 1; color: var(--fg-2); }
.asst__trace-step__label code {
  font-size: 11px; padding: 0 4px;
  background: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
}
.asst__trace-step__chip {
  font-size: 10px; font-weight: 600;
  color: var(--fg-4);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Citation chip(s) at the end of an answer */
.asst__cites { margin-top: 8px; }
.asst__cite {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 8px;
  background: #fff;
  border: 1px solid var(--mds-color-cyan-300);
  border-radius: 50rem;
  font-size: 11px; font-weight: 500;
  color: var(--mds-color-cyan-700);
  margin: 0 6px 4px 0;
  cursor: pointer;
  text-decoration: none;
  transition: all var(--transition-fast);
}
.asst__cite:hover {
  background: var(--mds-color-cyan-100);
  border-color: var(--mds-color-cyan-500);
}
.asst__cite i { font-size: 12px; }

/* Follow-up chips */
.asst__followups {
  display: flex; flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0 4px;
}
.asst__followup {
  background: #fff;
  border: 1px solid var(--border-subtle);
  border-radius: 50rem;
  padding: 6px 12px;
  font-family: inherit; font-size: 12px;
  color: var(--fg-2);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.asst__followup:hover {
  background: var(--mds-color-cyan-100);
  border-color: var(--mds-color-cyan-500);
  color: var(--mds-color-cyan-800);
}
.asst__followup i { font-size: 11px; margin-right: 4px; color: var(--fg-4); }

/* Thumbs row */
.asst__feedback {
  display: flex; gap: 2px; align-items: center;
  margin-top: 8px;
  font-size: 11px; color: var(--fg-4);
}
.asst__feedback button {
  background: transparent; border: 0;
  width: 22px; height: 22px;
  display: grid; place-items: center;
  color: var(--fg-4);
  border-radius: var(--r-xs);
  cursor: pointer;
}
.asst__feedback button:hover { background: var(--bg-subtle); color: var(--fg-1); }
.asst__feedback button.is-on { color: var(--mds-color-green-600); }
.asst__feedback button.is-off { color: var(--mds-color-red-600); }

/* Typing dots */
.asst__typing {
  display: inline-flex; gap: 4px; align-items: center;
  height: 16px;
}
.asst__typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--mds-color-cyan-500);
  animation: asst-dot 1.2s ease-in-out infinite;
}
.asst__typing span:nth-child(2) { animation-delay: 0.15s; }
.asst__typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes asst-dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-3px); opacity: 1; }
}

/* Caret while text is streaming */
.asst__caret {
  display: inline-block;
  width: 7px; height: 14px;
  background: var(--fg-2);
  vertical-align: -2px;
  margin-left: 1px;
  animation: asst-caret 1s steps(1) infinite;
}
@keyframes asst-caret { 50% { opacity: 0; } }

/* ===================== Composer ===================== */
.asst__composer {
  border-top: 1px solid var(--border-subtle);
  padding: 12px 16px 16px;
  background: #fff;
}
.asst__composer-box {
  position: relative;
  display: flex; align-items: flex-end;
  border: 1px solid var(--mds-color-gray-400);
  border-radius: var(--r-lg);
  background: #fff;
  padding: 4px 4px 4px 12px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.asst__composer-box:focus-within {
  border-color: var(--brand-primary);
  box-shadow: 0 0 0 3px var(--mds-color-blue-100);
}
.asst__composer textarea {
  flex: 1;
  border: 0; outline: 0;
  resize: none;
  background: transparent;
  font-family: inherit; font-size: 14px;
  color: var(--fg-1);
  line-height: 1.45;
  padding: 8px 0;
  min-height: 22px;
  max-height: 120px;
}
.asst__composer textarea::placeholder { color: var(--fg-4); }
.asst__composer-send {
  width: 32px; height: 32px;
  border-radius: var(--r-md);
  background: var(--brand-primary);
  color: #fff;
  border: 0;
  display: grid; place-items: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--transition-fast), opacity var(--transition-fast);
}
.asst__composer-send:disabled {
  background: var(--mds-color-gray-300);
  cursor: not-allowed;
}
.asst__composer-send i { font-size: 14px; }
.asst__composer-hint {
  display: flex; justify-content: space-between;
  margin-top: 8px;
  font-size: 11px; color: var(--fg-4);
}
.asst__composer-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  background: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-bottom-width: 2px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
}

/* Minimal mode (V4) — top of the body needs breathing room since there's no header */
.asst--minimal .asst__context { padding-top: 14px; padding-bottom: 12px; padding-right: 48px; }
.asst--minimal .asst__body { padding-top: 0; }

/* Floating close X in minimal mode (no header) */
.asst__minimal-close {
  position: absolute;
  top: 8px; right: 8px;
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: transparent;
  border: 0;
  color: var(--fg-3);
  display: grid; place-items: center;
  cursor: pointer;
  z-index: 2;
}
.asst__minimal-close:hover { background: var(--bg-subtle); color: var(--fg-1); }
.asst__minimal-close i { font-size: 16px; }

/* ===================== Sticky disclaimer banner ===================== */
.asst__disclaimer {
  position: sticky;
  top: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-3);
  background: var(--bg-subtle);
  border-bottom: 1px solid var(--border-subtle);
  padding: 8px 12px;
  margin: -20px -16px 16px;  /* counter the body's 20px / 16px padding so it sits flush */
}
.asst__disclaimer i { font-size: 14px; color: var(--mds-color-cyan-600); flex-shrink: 0; }

/* ===================== Inline answer tables ===================== */
.asst__answer-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin: 8px 0 10px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.asst__answer-table thead th {
  text-align: left;
  font-weight: 600;
  padding: 6px 10px;
  background: var(--bg-subtle);
  border-bottom: 1px solid var(--border-subtle);
  color: var(--fg-3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.asst__answer-table tbody td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--fg-2);
  vertical-align: top;
}
.asst__answer-table tbody tr:last-child td { border-bottom: none; }
.asst__answer-table tbody tr:nth-child(even) td { background: var(--bg-subtle); }
.asst__body::-webkit-scrollbar { width: 8px; }
.asst__body::-webkit-scrollbar-track { background: transparent; }
.asst__body::-webkit-scrollbar-thumb {
  background: var(--mds-color-gray-300);
  border-radius: 50rem;
  border: 2px solid #fff;
}
.asst__body::-webkit-scrollbar-thumb:hover { background: var(--mds-color-gray-400); }

</style>
